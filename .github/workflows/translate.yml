name: Translate README

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - README.md

permissions:
  contents: write

jobs:
  translate-readme:
    runs-on: ubuntu-latest
    env:
      CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
      CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload README source to Crowdin
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: false
          download_translations: false
          push_sources: false
          push_translations: false
          create_pull_request: false

      - name: Pre-translate on Crowdin
        uses: crowdin/github-action@v2
        with:
          command: pre-translate
          # Alterado de 'mt' para 'tm' para evitar o erro de engine-id. 
          # Se quiser usar MT, use: "-l pt-BR --method mt --engine-id SEU_ID"
          # Usamos 'tm' (Translation Memory) em vez de 'mt' (Machine Translation)
          # para evitar a necessidade de configurar um motor de IA pago.
          command_args: "-l pt-BR --method tm"

      - name: Download and Commit translations
        uses: crowdin/github-action@v2
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          download_language: pt-BR
          push_sources: false
          # A Action agora faz o commit e push automaticamente
          push_translations: true
          commit_message: "docs: update Portuguese README (automated)"
          localization_branch_name: ${{ github.ref_name }}
          create_pull_request: false
