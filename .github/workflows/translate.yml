name: Translate README

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - README.md

permissions:
  contents: write

jobs:
  translate-readme:
    runs-on: ubuntu-latest
    env:
      CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
      CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload README source to Crowdin
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: false
          download_translations: false
          push_sources: false
          push_translations: false
          create_pull_request: false

      - name: Pre-translate README to Portuguese
        uses: crowdin/github-action@v2
        with:
          command: pre-translate
          command_args: "-l pt-BR --method mt"

      - name: Download Portuguese README from Crowdin
        uses: crowdin/github-action@v2
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          download_language: pt-BR
          push_sources: false
          push_translations: false
          create_pull_request: false

      - name: Commit translated README
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Verifica se o arquivo README_pt.md realmente mudou antes de tentar o commit
          git add README_pt.md
          if git diff --staged --quiet; then
            echo "No translation changes to commit"
          else
            git commit -m "docs: update Portuguese README"
            git push
          fi
