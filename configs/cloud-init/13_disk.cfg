#cloud-config

disk_setup:
  /dev/sdb:
    table_type: gpt
    layout: [50, 50]
    overwrite: false
fs_setup:
  - device: /dev/sdb1
    filesystem: ext4
    label: sdb1
  - device: /dev/sdb2 
    filesystem: xfs
    label: sdb2
mounts:
  - ["/dev/sdb1", "/mnt/sdb1", "ext4", "defaults,noatime"]
  - ["/dev/sdb2", "/mnt/sdb2", "xfs", "defaults,noatime"]