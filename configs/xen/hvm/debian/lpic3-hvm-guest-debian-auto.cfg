# Xen HVM Guest Configuration - Debian 12 Automated Installation
type = "hvm"
name = "debian12-unattended"
memory = 4096
maxmem = 4096
vcpus = 3
maxvcpus = 3
vif = [ 'bridge=xenbr0' ]
vkb_device = 0
firmware = "seabios"
serial = "pty"

disk = [
    'phy:/dev/vg_xen/lpic3-hvm-guest-disk,xvda,w',
    'file:/home/vagrant/isos/debian/debian-12.8.0-amd64-DVD-1.iso,xvdb:cdrom,r'
]

# HVM direct kernel boot (host files extracted from Debian ISO)
kernel = "/var/lib/xen/boot/debian12/vmlinuz"
ramdisk = "/var/lib/xen/boot/debian12/initrd.gz"
cmdline = "auto=true priority=critical preseed/url=http://192.168.0.130:8000/preseed.cfg console=ttyS0,115200n8 ---"

boot = "d"
vnc = 1
